name: Deploy Trust Center to GitHub Pages

on:
  push:
    branches: [main]
  # Run the claim gate on PRs too. Without this, a broken claim check was only
  # discovered after merge, on main, where it silently blocked every deploy.
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Gate on advisories in dependencies we actually ship. This is a static
      # VitePress site with zero production dependencies, so --omit=dev scopes
      # the runtime-security gate to what reaches users (currently nothing).
      # The full build-time tail is now also clean: the prior advisories
      # (esbuild GHSA-67mh-4wv8-2f99, vite GHSA-4w7w-66w2-5vf9 /
      # GHSA-v6wh-96g9-6wx3 / GHSA-fx2h-pf6j-xcff, vitepress transitive) are
      # remediated via the package.json `overrides` pin to vite ^6.4.3 (which
      # pulls esbuild >=0.25), and postcss GHSA-qx2v-qp2m-jg93 via the
      # postcss ^8.5.10 pin — addressing audit findings DEP6 / PB1 (run-36).
      # `npm audit` (all deps) currently reports 0 vulnerabilities.
      - run: npm audit --omit=dev --audit-level=moderate

      - run: npm run test:claims

      - run: npm run check:claims

      - run: npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .vitepress/dist

  deploy:
    # PRs validate the site and the claim gate; only main publishes.
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
