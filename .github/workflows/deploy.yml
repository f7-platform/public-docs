name: Deploy Trust Center to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Gate on advisories in dependencies we actually ship. This is a static
      # VitePress site with zero production dependencies, so --omit=dev scopes
      # the runtime-security gate to what reaches users (currently nothing).
      # The remaining build-time advisories (esbuild GHSA-gv7w-rqvm-qjhr/
      # GHSA-67mh-4wv8-2f99, vite GHSA-4w7w-66w2-5vf9, vitepress transitive)
      # have fixAvailable=false upstream and are tracked as audit findings
      # DEP6 / PB1 (run-35). postcss GHSA-qx2v-qp2m-jg93 is remediated via the
      # package.json `overrides` pin to ^8.5.10. Run `npm audit` (all deps) to
      # review the build-time tail.
      - run: npm audit --omit=dev --audit-level=moderate

      - run: npm run test:claims

      - run: npm run check:claims

      - run: npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
