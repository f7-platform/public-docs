name: Audit Evidence Gate

# Canonical source: fseven-platform meta repo.
# Deploy a copy of this file to each child repo at .github/workflows/audit-evidence-gate.yml.
#
# Two responsibilities:
# 1. issues.closed   — auto-reopen any audit:run-N issue closed without an
#                       execution evidence-table comment or an APPROVED verifier comment.
# 2. issue_comment   — when the audit-verifier agent posts a verdict=APPROVED
#                       comment, remove status:needs-reaudit and close the issue.
#                       verdict=REJECTED takes no automated action.
#
# Implements the execution evidence rule from
# .github/agents/issue-executor.agent.md and the verifier handoff defined
# in .github/agents/audit-verifier.agent.md.

on:
  issues:
    types: [closed]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  enforce-close:
    if: github.event_name == 'issues' && contains(join(github.event.issue.labels.*.name, ','), 'audit:run-')
    runs-on: ubuntu-latest
    env:
      # Actor provenance allowlist (INF1): logins trusted to satisfy the gate with
      # an audit-verifier APPROVED verdict even when their author_association is not
      # a repo-write association. Comma/whitespace-separated. Set per-repo or
      # per-org via the AUDIT_VERIFIER_ALLOWLIST variable (e.g. a bot identity).
      AUDIT_VERIFIER_ALLOWLIST: ${{ vars.AUDIT_VERIFIER_ALLOWLIST }}
    steps:
      - name: Reopen if closed without evidence
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const auditLabel = labels.find(n => /^audit:run-\d+$/.test(n));
            if (!auditLabel) return;

            if (issue.state_reason === 'not_planned') {
              core.info(`Issue #${issue.number} closed as not_planned — skipping gate.`);
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            // Actor allowlist + provenance gate (INF1): only honor an APPROVED
            // verdict from a trusted maintainer (OWNER/MEMBER/COLLABORATOR) or an
            // allowlisted identity, posted in a well-formed verifier comment. A
            // forged marker from an arbitrary commenter must not keep a
            // manually-closed audit issue closed.
            const TRUSTED_ASSOCIATIONS = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const verifierAllowlist = (process.env.AUDIT_VERIFIER_ALLOWLIST || '')
              .split(/[\s,]+/)
              .map(s => s.trim().toLowerCase())
              .filter(Boolean);
            const isTrustedVerifierComment = (c) => {
              const assoc = c.author_association || 'NONE';
              const login = (c.user?.login || '').toLowerCase();
              return TRUSTED_ASSOCIATIONS.has(assoc) || verifierAllowlist.includes(login);
            };
            const verifierApproved = comments.some(c => {
              const cb = c.body || '';
              return /<!-- audit-verifier:verdict=APPROVED -->/.test(cb) &&
                /<!-- audit-verifier:start -->/.test(cb) &&
                /<!-- audit-verifier:end -->/.test(cb) &&
                isTrustedVerifierComment(c);
            });
            if (verifierApproved) {
              core.info(`Issue #${issue.number} has a trusted verifier APPROVED — gate passes.`);
              return;
            }

            const STATUS_RE = /\b(VERIFIED|PARTIAL|ALREADY-PRESENT|BLOCKED)\b/;
            const SHA_RE = /\b[0-9a-f]{7,40}\b/i;
            const TEST_RE = /cargo (test|build)|pnpm.*test|pytest|vitest|playwright|npm test/i;

            // Actor provenance on the evidence-table path (INF6): the shape
            // checks below (status word + SHA/test token, or a long body) only
            // verify TEXT SHAPE, not authenticity — any commenter could post a
            // status word plus a 7-40-char hex token to forge "evidence" and keep
            // a manually-closed audit issue closed. Require the evidence comment
            // to come from a trusted maintainer (OWNER/MEMBER/COLLABORATOR) or an
            // allowlisted identity, exactly as the verifier-APPROVED path does
            // (INF1). A forged evidence comment from an untrusted author no longer
            // satisfies the gate.
            const hasEvidence = comments.some(c => {
              if (!isTrustedVerifierComment(c)) return false;
              const body = c.body || '';
              if (!STATUS_RE.test(body)) return false;
              if (/\b(VERIFIED|PARTIAL)\b/.test(body)) {
                return SHA_RE.test(body) || TEST_RE.test(body);
              }
              return body.replace(/\s+/g, ' ').length > 120;
            });

            if (hasEvidence) {
              core.info(`Issue #${issue.number} closed with execution evidence — gate passes.`);
              return;
            }

            const closer = context.payload.sender?.login || 'unknown';
            core.warning(`Issue #${issue.number} closed by @${closer} without evidence — reopening.`);

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'open',
            });

            if (!labels.includes('status:needs-reaudit')) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['status:needs-reaudit'],
                });
              } catch (e) {
                core.warning(`Could not add status:needs-reaudit label: ${e.message}`);
              }
            }

            const body = [
              '## ⚠️ Audit Evidence Gate — auto-reopened',
              '',
              `This issue is labeled \`${auditLabel}\` but was closed without a completion comment containing the execution evidence table or an APPROVED audit-verifier comment.`,
              '',
              'To close this issue, do one of:',
              '',
              '- Post an execution completion comment with status tokens (`VERIFIED` / `PARTIAL` / `ALREADY-PRESENT` / `BLOCKED`), a commit SHA, and test/CI evidence; then close.',
              '- Invoke the `audit-verifier` agent. When it posts `verdict=APPROVED` this workflow will close the issue automatically.',
              '- If you intentionally want to abandon this work, close as `not planned` — that path is not gated.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body,
            });

  verifier-autoclose:
    if: github.event_name == 'issue_comment' && !github.event.issue.pull_request && contains(github.event.comment.body, '<!-- audit-verifier:verdict=APPROVED -->')
    runs-on: ubuntu-latest
    env:
      # Actor provenance allowlist (INF1): logins trusted to post audit-verifier
      # verdicts even when their author_association is not a repo-write association.
      # Comma/whitespace-separated. Set per-repo or per-org via the
      # AUDIT_VERIFIER_ALLOWLIST variable (e.g. a bot identity).
      AUDIT_VERIFIER_ALLOWLIST: ${{ vars.AUDIT_VERIFIER_ALLOWLIST }}
    steps:
      - name: Close on verifier approval
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const auditLabel = labels.find(n => /^audit:run-\d+$/.test(n));
            if (!auditLabel) {
              core.info('No audit:run-N label; ignoring verifier comment.');
              return;
            }

            const body = context.payload.comment.body || '';
            if (!/<!-- audit-verifier:start -->/.test(body) ||
                !/<!-- audit-verifier:end -->/.test(body)) {
              core.warning(`Approval marker without surrounding start/end markers on issue #${issue.number}; ignoring.`);
              return;
            }

            // --- Actor allowlist + provenance gate (INF1) ---
            // Only honor the APPROVED verdict when the comment author is a trusted
            // maintainer (OWNER/MEMBER/COLLABORATOR association) or an explicitly
            // allowlisted identity. This prevents any commenter from forging the
            // <!-- audit-verifier:verdict=APPROVED --> marker to bypass the gate.
            const TRUSTED_ASSOCIATIONS = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const allowlist = (process.env.AUDIT_VERIFIER_ALLOWLIST || '')
              .split(/[\s,]+/)
              .map(s => s.trim().toLowerCase())
              .filter(Boolean);
            const author = context.payload.comment.user?.login || '';
            const association = context.payload.comment.author_association || 'NONE';
            const trustedByAssociation = TRUSTED_ASSOCIATIONS.has(association);
            const trustedByAllowlist = allowlist.includes(author.toLowerCase());
            if (!trustedByAssociation && !trustedByAllowlist) {
              core.warning(
                `Ignoring audit-verifier APPROVED on issue #${issue.number}: author @${author} ` +
                `(association=${association}) is not a trusted maintainer and is not in ` +
                `AUDIT_VERIFIER_ALLOWLIST; refusing to auto-close.`
              );
              return;
            }
            core.info(
              `Verifier APPROVED on issue #${issue.number} accepted from @${author} ` +
              `(association=${association}, allowlisted=${trustedByAllowlist}).`
            );

            if (labels.includes('status:needs-reaudit')) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'status:needs-reaudit',
                });
              } catch (e) {
                core.warning(`Could not remove status:needs-reaudit: ${e.message}`);
              }
            }

            const wasOpen = issue.state !== 'closed';
            if (wasOpen) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              const verifier = context.payload.sender?.login || 'audit-verifier';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## ✅ Audit Evidence Gate — auto-closed\n\nClosed automatically based on \`audit-verifier\` APPROVED verdict from @${verifier}. See the verifier report comment above for per-criterion evidence.`,
              });
            } else {
              core.info(`Issue #${issue.number} already closed; verifier APPROVED — stripped status:needs-reaudit if present, no state change.`);
            }
